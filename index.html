<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="icon" href="https://me.ug.cx/ico/nginx.ico" type="image/x-icon">
<title>欢迎来到 Nginx！</title>
<style>
html { color-scheme: light dark; }
body {
    width: 35em;
    margin: 0 auto;
    font-family: Tahoma, Verdana, Arial, sans-serif;
}

.serverinfo{
    margin-top:30px;
    padding:12px;
    border-radius:6px;
    background:#f2f2f2;
    font-weight: normal;      
    font-size:16px;           
    font-family: Tahoma, Verdana, Arial, sans-serif; 
    line-height:1.6;
}
</style>
</head>
<body>
<h1>欢迎来到 Nginx！</h1>
<br>
<p>如果你看到这个页面，说明 Nginx 网页服务器已经正确安装并开始工作，需要进一步配置。</p>
<p>有关在线文档和支持，请参阅
<a href="https://nginx.org/">nginx.org</a>.<br/>
商业支持可通过
<a href="https://nginx.com/">nginx.com</a> 获得
</p>
<br>
<p><em>感谢您使用 Nginx.</em></p>

<!-- 新增服务器和访问者信息 -->
<div class="serverinfo">
<p>服务器IP：<span id="serverip">检测中...</span></p>
<p>访问者IP：<span id="clientip">检测中...</span></p>
</div>

<script>
// 国家中文映射
const countryCN = {
  "Singapore":"新加坡",
  "United States":"美国",
  "Hong Kong":"中国香港",
  "China":"中国",
  "Taiwan":"中国台湾",
  "Japan":"日本"
};

// 获取服务器IP（通过 Vercel Serverless API）
fetch("/api/serverip")
.then(res => res.json())
.then(data=>{
  const country = countryCN[data.country] || data.country;
  document.getElementById("serverip").textContent =
    data.ip + " (" + country + " " + data.region + ")";
})
.catch(()=>{
  document.getElementById("serverip").textContent = "获取失败";
});

// 获取访问者IP（使用可靠API）
fetch("https://ipwhois.app/json/")
.then(res => res.json())
.then(data=>{
  const country = countryCN[data.country] || data.country;
  document.getElementById("clientip").textContent =
    data.ip + " (" + country + " " + (data.region || "") + ")";
})
.catch(()=>{
  document.getElementById("clientip").textContent = "获取失败";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="icon" href="https://me.ug.cx/ico/nginx.ico" type="image/x-icon">
<title>欢迎来到 Nginx！</title>
<style>
html { color-scheme: light dark; }
body {
    width: 35em;
    margin: 0 auto;
    font-family: Tahoma, Verdana, Arial, sans-serif;
}

.serverinfo{
    margin-top:30px;
    padding:12px;
    border-radius:6px;
    background:#f2f2f2;
    font-size:13px;
    line-height:1.6;
}

.serverinfo h3{
    margin-top:0;
    font-size:14px;
}
</style>
</head>
<body>
<h1>欢迎来到 Nginx！</h1>
<br>
<p>如果你看到这个页面，说明 Nginx 网页服务器已经正确安装并开始工作，需要进一步配置。</p>
<p>有关在线文档和支持，请参阅
<a href="https://nginx.org/">nginx.org</a>.<br/>
商业支持可通过
<a href="https://nginx.com/">nginx.com</a> 获得
</p>
<br>
<p><em>感谢您使用 Nginx.</em></p>

<div class="serverinfo">

<h3>服务器信息</h3>

<p><b>服务器IP：</b> <span id="serverip">检测中...</span></p>

<p><b>访问者IP：</b> <span id="clientip">检测中...</span></p>

</div>

<script>

// 国家中文映射
const countryCN = {
"Singapore":"新加坡",
"United States":"美国",
"Japan":"日本",
"China":"中国",
"Germany":"德国",
"United Kingdom":"英国",
"France":"法国",
"Hong Kong":"中国香港",
"Taiwan":"中国台湾"
};

// 获取访问者IP
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
let country = countryCN[data.country_name] || data.country_name;
document.getElementById("clientip").textContent =
data.ip + " (" + country + " " + data.region + ")";
});

// 获取服务器IP
fetch("https://dns.google/resolve?name="+location.hostname+"&type=A")
.then(res=>res.json())
.then(d=>{
let ip=d.Answer[0].data;

fetch("https://ipapi.co/"+ip+"/json/")
.then(r=>r.json())
.then(g=>{
let country = countryCN[g.country_name] || g.country_name;

document.getElementById("serverip").textContent =
ip + " (" + country + " " + g.region + ")";
});
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="icon" href="https://me.ug.cx/ico/nginx.ico" type="image/x-icon">
<title>Nginx 服务器信息</title>

<style>
html { color-scheme: light dark; }

body{
    width:40em;
    margin:0 auto;
    font-family:Tahoma,Verdana,Arial,sans-serif;
}

.info{
    background:#f2f2f2;
    padding:15px;
    border-radius:8px;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>欢迎来到 Nginx！</h1>

<p>如果你看到这个页面，说明 Nginx 网页服务器已经正确安装并开始工作。</p>

<div class="info">

<p><b>服务器地址：</b> me-vercel-gamma.vercel.app</p>

<p><b>访问域名：</b> <span id="host"></span></p>

<p><b>完整访问地址：</b> <span id="url"></span></p>

<p><b>访问者IP：</b> <span id="ip">检测中...</span></p>

</div>

<br>

<p><em>感谢您使用 Nginx.</em></p>

<script>

document.getElementById("host").textContent = window.location.host;
document.getElementById("url").textContent = window.location.href;

// 获取访问IP
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {
    document.getElementById("ip").textContent = data.ip;
})
.catch(()=>{
    document.getElementById("ip").textContent = "获取失败";
});

</script>

</body>
</html>
